<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #eef1f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    background: #fff;
    padding: 25px;
    border-radius: 15px;
    width: 320px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  }

  h2 {
    text-align: center;
    margin-bottom: 20px;
  }

  input {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: 1px solid #ccc;
  }

  .habit {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
  }

  .habit span {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 10px;
    background: #4CAF50;
    color: white;
    font-size: 16px;
    cursor: pointer;
  }

  button:hover {
    background: #45a049;
  }
</style>
</head>

<body>

<div class="container">
  <h2>Daily Habit Tracker</h2>

  <input type="text" id="userId" placeholder="Enter User ID">

  <div class="habit">
    <span>🧘 Yoga / Workout</span>
    <input type="checkbox" id="yoga">
  </div>

  <div class="habit">
    <span>🧠 Self Control</span>
    <input type="checkbox" id="control">
  </div>

  <div class="habit">
    <span>🎧 Audio Creation</span>
    <input type="checkbox" id="audio">
  </div>

  <div class="habit">
    <span>📚 Learning / Reading</span>
    <input type="checkbox" id="learning">
  </div>

  <div class="habit">
    <span>❄️ Face Wash with Ice</span>
    <input type="checkbox" id="face">
  </div>

  <div class="habit">
    <span>🌙 Reflect Before Sleep</span>
    <input type="checkbox" id="reflect">
  </div>

  <button onclick="saveData()">Save Today</button>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyIWWqjxTbPzKhH1PSbjaZDivIIiPWwedS-i5eRNFyK9Ui_GPpOR1x3UxuTAY2K0mRI/exec";

function saveData() {
  const userId = document.getElementById("userId").value;

  if (!userId) {
    alert("Please enter User ID");
    return;
  }

  const today = new Date().toISOString().split("T")[0];

  const data = {
    user_id: userId,
    date: today,
    yoga_workout: document.getElementById("yoga").checked ? 1 : 0,
    self_control: document.getElementById("control").checked ? 1 : 0,
    audio_creation: document.getElementById("audio").checked ? 1 : 0,
    learning_reading: document.getElementById("learning").checked ? 1 : 0,
    face_wash_ice: document.getElementById("face").checked ? 1 : 0,
    reflect_sleep: document.getElementById("reflect").checked ? 1 : 0
  };

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.text())
  .then(() => {
    alert("✅ Saved to Google Sheets!");
  })
  .catch(() => {
    alert("❌ Error saving data");
  });
}
</script>

</body>
</html>
